<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Perfume Shop{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        .navbar { background-color: #000; } 
        .navbar-brand { font-weight: bold; letter-spacing: 2px; }
        footer { background-color: #f8f9fa; margin-top: 50px; padding: 20px 0; }
        /* Чтобы иконка не была слишком мелкой */
        .bi-person-circle, .bi-person { font-size: 1.4rem; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'product_list' %}">SPLENDEUR</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'product_list' %}">Каталог</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'cart_detail' %}">Корзина</a>
                    </li>

                    <li class="nav-item ms-lg-3">
                        {% if user.is_authenticated %}
                            <div class="dropdown">
                                <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                    <i class="bi bi-person-circle"></i>
                                    <span class="ms-2 d-lg-none">{{ user.username }}</span>
                                </a>
                                <ul class="dropdown-menu dropdown-menu-end shadow">
                                    <li><span class="dropdown-item-text fw-bold border-bottom pb-2">{{ user.username }}</span></li>
                                    <li><a class="dropdown-item mt-2" href="#">Личный кабинет</a></li> <li><hr class="dropdown-divider"></li>
                                    <li>
                                        <form action="{% url 'logout' %}" method="post" class="px-3 py-1">
                                            {% csrf_token %}
                                            <button type="submit" class="btn btn-sm btn-danger w-100">Выйти</button>
                                        </form>
                                    </li>
                                </ul>
                            </div>
                        {% else %}
                            <a class="nav-link" href="{% url 'login' %}" title="Войти">
                                <i class="bi bi-person"></i>
                            </a>
                        {% endif %}
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="text-center">
        <div class="container">
            <p class="text-muted">© 2026 Магазин парфюмерии "Splendeur". Мария Коледа.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
