{% extends 'shop/base.html' %}
{% load crispy_forms_tags %} {% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow-sm border-0 p-4">
            <h2 class="text-center mb-4">Вход</h2>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }} <button type="submit" class="btn btn-dark w-100">Войти</button>
            </form>
            <p class="text-center mt-3">
                Нет аккаунта? <a href="{% url 'signup' %}" class="text-dark fw-bold">Зарегистрироваться</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
